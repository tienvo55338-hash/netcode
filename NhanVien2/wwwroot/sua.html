<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Nhân viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="card mx-auto shadow p-4" style="width: 400px; border-top: 5px solid #ffc107;">
        <h4 class="text-center text-warning mb-3">CẬP NHẬT</h4>
        
        <label class="small text-muted">Mã nhân viên:</label>
        <input id="m" class="form-control mb-2 bg-light" readonly>
        
        <label class="small text-muted">Họ tên mới:</label>
        <input id="t" class="form-control mb-3">
        
        <button class="btn btn-warning w-100 fw-bold" onclick="update()">Cập nhật ngay</button>
    </div>

    <script>
        // Bóc tách dữ liệu từ URL và điền vào form
        const p = new URLSearchParams(window.location.search);
        document.getElementById('m').value = p.get('ma');
        document.getElementById('t').value = p.get('ten');

        // Hàm xử lý gửi dữ liệu cập nhật về API Backend (.NET)
        function update() {
            const data = {
                manv: document.getElementById('m').value,
                hoten: document.getElementById('t').value
            };

            fetch('/api/nhanvien', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(r => r.ok ? location.href = "index.html" : alert("Lỗi khi cập nhật!"));
        }
    </script>
</body>
</html>
