<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Nhân viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container shadow bg-white p-4 rounded">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary">DANH SÁCH NHÂN VIÊN</h2>
            <a href="them.html" class="btn btn-success">+ Thêm nhân viên mới</a>
        </div>
        <table class="table table-bordered table-hover">
            <thead class="table-primary text-center">
                <tr>
                    <th>Mã Nhân Viên</th>
                    <th>Họ và Tên</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="list" class="text-center"></tbody>
        </table>
    </div>
    <script>
    function taiData() {
        fetch('/api/nhanvien').then(r => r.json()).then(data => {
            let h = ''; // Lưu ý: Cần khởi tạo biến h ở đây thưa anh
            data.forEach(x => {
                h += `<tr>
                    <td class="fw-bold">${x.manv}</td>
                    <td>${x.hoten}</td>
                    <td>
                        <a href="sua.html?ma=${x.manv}&ten=${x.hoten}" class="btn btn-warning btn-sm">Sửa</a>
                        <button onclick="xoa('${x.manv}')" class="btn btn-danger btn-sm">Xóa</button>
                    </td>
                </tr>`;
            });
            document.getElementById('list').innerHTML = h;
        });
    }

    function xoa(id) {
        if(confirm('Xác nhận xóa?')) fetch('/api/nhanvien/'+id, {method:'DELETE'}).then(taiData);
    }
    
    taiData();
</script>
</body>
</html>
